<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <style>
      text { font-family: 'Newsreader', 'Source Serif 4', Georgia, 'Iowan Old Style', serif; }
      .mono { font-family: 'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace; }
    </style>
  </defs>

  <!-- warm off-white background, matching the site's --bg -->
  <rect width="1200" height="630" fill="#faf8f3"/>

  <!-- subtle hairline frame -->
  <rect x="32" y="32" width="1136" height="566" fill="none" stroke="#e6e2dc" stroke-width="1"/>

  <!-- eyebrow: green rule + label, mirroring the homepage hero motif -->
  <rect x="80" y="86" width="36" height="2" fill="#2e9d6c"/>
  <text class="mono" x="128" y="95" font-size="14" font-weight="500" letter-spacing="2.5" fill="#928e8c">WRITING · 2026</text>

  <!-- big title — "my jax journey" with italic accent on "jax journey",
       same treatment used on the homepage hero h1 -->
  <text x="80" y="290" font-size="112" font-weight="500" letter-spacing="-1.5" fill="#2a2725">my <tspan font-style="italic" fill="#1a5d3f">jax journey</tspan></text>

  <!-- subtitle in serif italic, two soft-ink lines -->
  <text x="80" y="378" font-size="30" font-style="italic" fill="#666261">notes on learning to think in JAX —</text>
  <text x="80" y="420" font-size="30" font-style="italic" fill="#666261">from autodiff and the roofline to Pallas kernels.</text>

  <!-- footer rule + byline -->
  <line x1="80" y1="510" x2="1120" y2="510" stroke="#e6e2dc" stroke-width="1"/>
  <text class="mono" x="80" y="552" font-size="18" fill="#2a2725">abdur rahim<tspan fill="#928e8c">  ·  35 chapters · 7 parts</tspan></text>
  <text class="mono" x="1120" y="552" font-size="18" fill="#928e8c" text-anchor="end">arahim3.github.io/jax-journey</text>
</svg>
